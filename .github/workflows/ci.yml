name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  plugin-validation:
    name: Plugin validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect plugin changes
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="HEAD~1"
            HEAD="HEAD"
          fi

          CHANGED="$(git diff --name-only "$BASE" "$HEAD" || true)"
          printf '%s\n' "$CHANGED"

          if printf '%s\n' "$CHANGED" | grep -qE '^(plugins/|schemas/plugin/|scripts/(lib/plugin-package-validator|build-plugin-packages|build-web-plugins|validate-changed-plugins)\.mjs|status-plugin-example/|web/src/views/Plugin)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.changes.outputs.run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.changes.outputs.run == 'true'
        run: npm ci

      - name: Validate bundled and example plugins
        if: steps.changes.outputs.run == 'true'
        run: |
          npm run plugins:check
          npm run plugin-example:check
          npm run plugins:docs:check

      - name: Validate changed plugin directories
        if: steps.changes.outputs.run == 'true'
        run: npm run plugins:validate-pr
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}

  web-and-registry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

  native:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run Swift tests
        run: swift test

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS app
        run: xcodebuild -project Status.xcodeproj -scheme StatusMac -destination 'platform=macOS' -derivedDataPath /tmp/status-mac-derived build

      - name: Build iOS app
        run: xcodebuild -project Status.xcodeproj -scheme StatusiOS -destination 'generic/platform=iOS' -derivedDataPath /tmp/status-ios-derived CODE_SIGNING_ALLOWED=NO build

  deploy-cloudflare:
    name: Deploy Cloudflare
    runs-on: ubuntu-latest
    needs:
      - plugin-validation
      - web-and-registry
      - native
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: cloudflare-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run web:build

      - name: Build plugin artifacts
        run: npm run plugins:build

      - name: Upload plugin artifacts to R2
        run: npm run plugins:upload-r2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8cef251b5fdcf6c6f63db98b7aa49f9a

      - name: Deploy registry Worker
        run: npm run registry:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8cef251b5fdcf6c6f63db98b7aa49f9a

      - name: Deploy Pages site
        run: npm run pages:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 8cef251b5fdcf6c6f63db98b7aa49f9a
